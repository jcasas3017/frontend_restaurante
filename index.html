<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestaControl | Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/login.css" rel="stylesheet">
</head>
<body class="login-body">

<div class="login-wrapper">
    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <i class="bi bi-cup-hot-fill"></i>
        </div>
        <h1 class="login-title">RestaControl</h1>
        <p class="login-subtitle">Sistema de Gestión de Restaurante</p>

        <!-- Error alert -->
        <div class="alert alert-danger d-flex align-items-center gap-2 mb-3" id="loginError" role="alert" style="display:none!important;">
            <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
            <span id="loginErrorMsg">Usuario o contraseña incorrectos.</span>
        </div>

        <!-- Form -->
        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label class="form-label fw-semibold" for="username">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Ej: jcasas" autocomplete="username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold" for="password">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    <button type="button" class="btn btn-outline-secondary" id="togglePwd" title="Mostrar / ocultar contraseña">
                        <i class="bi bi-eye" id="togglePwdIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-brand w-100 py-2" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
        </form>

        <!-- Hint -->
        <div class="login-hint mt-4">
            <i class="bi bi-info-circle me-1"></i>
            <strong>Acceso:</strong> jcasas / (tu contraseña real en BD)
        </div>
    </div>
</div>

<footer class="login-footer">
    &copy; 2026 RestaControl &mdash; Universidad Tecnológica del Perú &mdash; Marcos de Desarrollo Web
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script>
    // Toggle password visibility
    document.getElementById('togglePwd').addEventListener('click', function () {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('togglePwdIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pwd.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });

    // Login form submit
    // Login form submit (con Spring Boot)
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const errorEl = document.getElementById('loginError');

        if (!user || !pass) {
            errorEl.style.display = '';
            document.getElementById('loginErrorMsg').textContent = 'Por favor completa todos los campos.';
            return;
        }

        try {
            const result = await Auth.login(user, pass);

            if (result.success) {
                errorEl.style.display = 'none';
                window.location.href = 'pages/dashboard.html';
            } else {
                errorEl.style.display = '';
                document.getElementById('loginErrorMsg').textContent = result.message || 'Usuario o contraseña incorrectos.';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }

        } catch (error) {
            errorEl.style.display = '';
            document.getElementById('loginErrorMsg').textContent = 'Error conectando con el backend';
        }
    });

    // If already logged in, redirect to dashboard
    if (Auth.getSession()) {
        window.location.href = 'pages/dashboard.html';
    }
</script>
</body>
</html>
